<!doctype html>
<html lang="en" ng-app="cssEventApp">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Q9 AngularJS Form with CSS and Events</title>
  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
  <style>
    body { font-family: Verdana, sans-serif; margin: 24px; }
    .box { padding: 12px; border: 1px solid #ccc; width: 280px; transition: 0.2s; }
    .active { border-color: #00897b; background: #e0f2f1; }
    .msg { margin-top: 10px; color: #00695c; font-weight: 600; }
    input { width: 100%; margin: 8px 0; padding: 8px; }
    button { padding: 8px 12px; }
  </style>
</head>
<body ng-controller="FormCtrl">
  <h2>AngularJS Form: CSS and Events</h2>

  <div class="box" ng-class="{active: isActive}" ng-mouseenter="hover(true)" ng-mouseleave="hover(false)">
    <label>Name</label>
    <input type="text" ng-model="user.name" placeholder="Enter name" />

    <button ng-click="toggleStyle()">Toggle Style</button>
    <button ng-click="clear()">Clear</button>

    <p class="msg">{{message}}</p>
  </div>

  <script>
    angular.module("cssEventApp", []).controller("FormCtrl", function($scope) {
      $scope.user = { name: "" };
      $scope.isActive = false;
      $scope.message = "Hover or click buttons to trigger events.";

      $scope.toggleStyle = function() {
        $scope.isActive = !$scope.isActive;
        $scope.message = "Style " + ($scope.isActive ? "enabled" : "disabled");
      };

      $scope.clear = function() {
        $scope.user.name = "";
        $scope.message = "Form cleared";
      };

      $scope.hover = function(flag) {
        if (flag) $scope.message = "Mouse entered form area";
      };
    });
  </script>
</body>
</html>
